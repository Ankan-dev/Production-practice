name: Push to dockerhub and Deploy in EC2

on:
  workflow_run:  
    workflows: ["Integration"]
    types: 
        - completed

jobs:

  build:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    name: build and push 
    runs-on: ubuntu-latest

    env:
        VITE_API_URL: ${{secrets.VITE_API_URL}}

    steps:
    - uses: actions/checkout@v4

    - name: login to dockerhub
      uses: docker/login-action@v3
      with: 
       username: ${{secrets.DOCKER_USERNAME}}
       password: ${{secrets.DOCKER_PASSWORD}}

    - name: Build the client Docker image and push to dockerhub
      uses: docker/build-push-action@v6
      with:
        context: ./client
        push: true
        platforms: linux/amd64
        tags: ankandev/client:latest

    - name: Buld the server Docker image and push to dockerhub
      uses: docker/build-push-action@v6
      with:
        context: ./server
        push: true
        platforms: linux/amd64
        tags: ankandev/server:latest

    - name: Deploy in EC2 server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{secrets.EC2_HOST}}
        username: ${{secrets.EC2_USERNAME}}
        key: ${{secrets.EC2_KEY}}
        script: |
          cd /opt/app
          sudo docker compose pull
          sudo docker compose up -d


